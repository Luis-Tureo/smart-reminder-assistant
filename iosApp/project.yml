name: iosApp

options:
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "15.0"

settings:
  base:
    SWIFT_VERSION: 5.9
    PRODUCT_NAME: iosApp

schemes:
  iosApp:
    build:
      targets:
        iosApp: all
    run:
      config: Debug
    archive:
      config: Release
    management:
      shared: true

targets:
  iosApp:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources
      - path: Resources
        excludes:
          - Info.plist
    info:
      path: Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.luistureo.voicereminderapp.iosApp
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - framework: ../shared/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)/sharedKit.framework
        embed: true
    preBuildScripts:
      - name: Build sharedKit
        script: |
          cd "$SRCROOT/.."
          sh ./gradlew :shared:embedAndSignAppleFrameworkForXcode
